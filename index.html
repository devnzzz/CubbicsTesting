<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Detection 3D Shapes</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.4.1646424915/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.4.1646424915/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 1000px;
            width: 100%;
        }
        
        h1 {
            font-size: 28px;
            margin-bottom: 24px;
            color: #333;
            text-align: center;
        }
        
        .content {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 24px;
            margin-bottom: 20px;
        }
        
        .main {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        #video {
            display: none;
        }
        
        canvas {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            width: 100%;
            background: #f5f5f5;
        }
        
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .card {
            background: #f9f9f9;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 16px;
        }
        
        .card-label {
            font-size: 12px;
            color: #666;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        
        .card-content {
            font-size: 16px;
            color: #333;
            font-weight: 500;
        }
        
        .direction {
            font-size: 24px;
            color: #667eea;
            font-weight: bold;
        }
        
        .shapes-info {
            font-size: 14px;
            color: #555;
            line-height: 1.8;
        }
        
        .shapes-info div {
            margin: 6px 0;
        }
        
        .status-active {
            color: #10b981;
            font-weight: 600;
        }
        
        .status-inactive {
            color: #ef4444;
            font-weight: 600;
        }
        
        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
            }
            
            .sidebar {
                flex-direction: row;
                flex-wrap: wrap;
            }
            
            .card {
                flex: 1;
                min-width: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Hand Detection 3D Shapes</h1>
        
        <div class="content">
            <div class="main">
                <video id="video" width="640" height="480"></video>
                <canvas id="canvas"></canvas>
            </div>
            
            <div class="sidebar">
                <div class="card">
                    <div class="card-label">Status</div>
                    <div class="card-content">
                        <span id="status" class="status-inactive">Loading...</span>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-label">Arah Tangan</div>
                    <div class="card-content direction" id="direction">—</div>
                </div>
                
                <div class="card">
                    <div class="card-label">Shapes</div>
                    <div class="shapes-info">
                        <div>🔴 Kubus Merah</div>
                        <div>🔵 Piramida Biru</div>
                        <div>🟢 Kotak Hijau</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Canvas setup
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const video = document.getElementById('video');
        
        // Set canvas size
        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = Math.min(rect.width, 640);
            canvas.height = (canvas.width / 640) * 480;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        // Three.js setup
        let scene, camera, renderer, shapes = [];
        let handPos = { x: 0, y: 0, vx: 0, vy: 0 };
        
        function initThreeJS() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf5f5f5);
            
            camera = new THREE.PerspectiveCamera(75, canvas.width / canvas.height, 0.1, 1000);
            camera.position.z = 5;
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(canvas.width, canvas.height);
            renderer.setPixelRatio(window.devicePixelRatio);
            
            // Replace canvas content with Three.js renderer
            canvas.parentElement.replaceChild(renderer.domElement, canvas);
            renderer.domElement.id = 'canvas';
            renderer.domElement.style.borderRadius = '8px';
            renderer.domElement.style.border = '2px solid #e0e0e0';
            
            // Cube
            const cubeGeom = new THREE.BoxGeometry(1, 1, 1);
            const cubeMat = new THREE.MeshPhongMaterial({ color: 0xff6b6b });
            const cube = new THREE.Mesh(cubeGeom, cubeMat);
            cube.position.x = -2;
            scene.add(cube);
            
            // Pyramid (Tetrahedron)
            const pyramidGeom = new THREE.TetrahedronGeometry(0.8);
            const pyramidMat = new THREE.MeshPhongMaterial({ color: 0x4ecdc4 });
            const pyramid = new THREE.Mesh(pyramidGeom, pyramidMat);
            pyramid.position.x = 0;
            scene.add(pyramid);
            
            // Box (Rectangle)
            const boxGeom = new THREE.BoxGeometry(1.5, 0.6, 0.8);
            const boxMat = new THREE.MeshPhongMaterial({ color: 0x95e1d3 });
            const box = new THREE.Mesh(boxGeom, boxMat);
            box.position.x = 2;
            scene.add(box);
            
            shapes = [cube, pyramid, box];
            
            // Lighting
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(5, 5, 5);
            scene.add(light);
            
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);
            
            // Animation loop
            function animate() {
                requestAnimationFrame(animate);
                
                shapes.forEach(shape => {
                    shape.rotation.x += 0.005;
                    shape.rotation.y += 0.008;
                });
                
                renderer.render(scene, camera);
            }
            animate();
            
            window.addEventListener('resize', () => {
                const rect = renderer.domElement.parentElement.getBoundingClientRect();
                const width = Math.min(rect.width, 640);
                const height = (width / 640) * 480;
                camera.aspect = width / height;
                camera.updateProjectionMatrix();
                renderer.setSize(width, height);
            });
        }
        
        // MediaPipe setup
        const hands = new Hands({
            locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${file}`;
            }
        });
        
        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });
        
        hands.onResults(onResults);
        
        function onResults(results) {
            updateStatus('Siap! Gerakkan tangan ke kiri/kanan/atas/bawah');
            
            // Draw on canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#f5f5f5';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            if (results.landmarks && results.landmarks.length > 0) {
                const hand = results.landmarks[0];
                const palmX = (hand[9].x - 0.5) * 6;
                const palmY = (0.5 - hand[9].y) * 6;
                
                // Calculate velocity
                const oldVx = handPos.vx;
                const oldVy = handPos.vy;
                handPos.vx = palmX - handPos.x;
                handPos.vy = palmY - handPos.y;
                handPos.x = palmX;
                handPos.y = palmY;
                
                // Detect direction
                const vx = handPos.vx;
                const vy = handPos.vy;
                
                let directionText = '—';
                if (Math.abs(vx) > Math.abs(vy)) {
                    directionText = vx > 0.3 ? '→ Kanan' : vx < -0.3 ? '← Kiri' : '↔ Stabil';
                } else {
                    directionText = vy > 0.3 ? '↑ Atas' : vy < -0.3 ? '↓ Bawah' : '⬌ Stabil';
                }
                
                document.getElementById('direction').textContent = directionText;
                
                // Move shapes
                shapes.forEach((shape, idx) => {
                    const targetX = palmX + (idx - 1) * 2;
                    const targetY = palmY;
                    shape.position.x += (targetX - shape.position.x) * 0.1;
                    shape.position.y += (targetY - shape.position.y) * 0.1;
                });
                
                // Draw hand landmarks
                drawHand(hand);
            }
        }
        
        function drawHand(landmarks) {
            // Draw skeleton
            ctx.strokeStyle = '#667eea';
            ctx.lineWidth = 2;
            
            const connections = [
                [0, 1], [1, 2], [2, 3], [3, 4],
                [0, 5], [5, 6], [6, 7], [7, 8],
                [0, 9], [9, 10], [10, 11], [11, 12],
                [0, 13], [13, 14], [14, 15], [15, 16],
                [0, 17], [17, 18], [18, 19], [19, 20],
                [5, 9], [9, 13], [13, 17], [0, 17]
            ];
            
            connections.forEach(([start, end]) => {
                const p1 = landmarks[start];
                const p2 = landmarks[end];
                ctx.beginPath();
                ctx.moveTo(p1.x * canvas.width, p1.y * canvas.height);
                ctx.lineTo(p2.x * canvas.width, p2.y * canvas.height);
                ctx.stroke();
            });
            
            // Draw landmarks
            ctx.fillStyle = '#764ba2';
            landmarks.forEach(point => {
                ctx.beginPath();
                ctx.arc(point.x * canvas.width, point.y * canvas.height, 4, 0, 2 * Math.PI);
                ctx.fill();
            });
        }
        
        function updateStatus(text) {
            const statusEl = document.getElementById('status');
            statusEl.textContent = text;
            statusEl.className = 'status-active';
        }
        
        function updateStatusError(text) {
            const statusEl = document.getElementById('status');
            statusEl.textContent = text;
            statusEl.className = 'status-inactive';
        }
        
        // Start
        async function start() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: { ideal: 640 }, height: { ideal: 480 } }
                });
                
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.play();
                    updateStatus('Initializing...');
                    initThreeJS();
                    
                    const camera = new Camera(video, {
                        onFrame: async () => {
                            await hands.send({ image: video });
                        },
                        width: 640,
                        height: 480
                    });
                    camera.start();
                };
            } catch (err) {
                updateStatusError('❌ Ijinkan akses kamera!');
                console.error(err);
            }
        }
        
        // Start the app
        start();
    </script>
</body>
</html>
